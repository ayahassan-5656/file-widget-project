<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>File Widget</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #f4f7fb;
      color: #1f2937;
    }

    .container {
      max-width: 950px;
      margin: 30px auto;
      padding: 20px;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    h2 {
      margin: 0;
    }

    p.subtitle {
      margin: 0 0 20px;
      color: #6b7280;
    }

    .upload-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .upload-row input[type="text"] {
      min-width: 280px;
      flex: 1;
      padding: 10px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      background: #fff;
    }

    input[type="file"] {
      padding: 10px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      background: #fff;
    }

    .search-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 14px;
      margin-bottom: 12px;
    }

    .search-row input {
      min-width: 260px;
      flex: 1;
      padding: 10px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      background: #fff;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s ease;
    }

    .btn-upload {
      background: #2563eb;
      color: white;
    }

    .btn-upload:hover {
      background: #1d4ed8;
    }

    .btn-download {
      background: #10b981;
      color: white;
    }

    .btn-download:hover {
      background: #059669;
    }

    .btn-delete {
      background: #ef4444;
      color: white;
    }

    .btn-delete:hover {
      background: #dc2626;
    }

    .status {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
    }

    .status.success {
      background: #ecfdf5;
      color: #065f46;
      border: 1px solid #a7f3d0;
    }

    .status.error {
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .table-scroll {
      max-height: 320px;
      overflow-y: auto;
      overflow-x: auto;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 700px;
    }

    th, td {
      text-align: left;
      padding: 14px 12px;
      border-bottom: 1px solid #e5e7eb;
      vertical-align: middle;
    }

    th {
      background: #f9fafb;
      color: #374151;
      font-size: 14px;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    td {
      font-size: 14px;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .empty-state {
      text-align: center;
      padding: 28px 12px;
      color: #6b7280;
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: #eef2ff;
      color: #4338ca;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    @media (max-width: 640px) {
      .upload-row {
        flex-direction: column;
        align-items: stretch;
      }

      .search-row {
        flex-direction: column;
        align-items: stretch;
      }

      button {
        width: 100%;
      }

      .actions button {
        width: auto;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>File Manager</h1>
      <p class="subtitle">Upload, download, and delete files from MongoDB.</p>

      <div class="upload-row">
  <input type="file" id="fileInput" />

  <button class="btn-upload" onclick="uploadFile()">
    Upload File
  </button>
</div>/>

        <input type="file" id="fileInput" />

        <button class="btn-upload" onclick="uploadFile()">
          Upload File
        </button>
      </div>

      <div id="statusMessage" class="status"></div>
    </div>

    <div class="card">
      <div class="top-row">
        <h2>Stored Files</h2>
        <span class="badge" id="fileCount">0 files</span>
      </div>

      <div class="search-row">
        <input
          type="text"
          id="searchInput"
          placeholder="Search by File ID..."
          oninput="filterFiles()"
        />
      </div>

      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>File ID</th>
              <th>Size</th>
              <th>Uploaded</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="fileTable"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
